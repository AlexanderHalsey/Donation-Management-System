name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install
        shell: bash
        working-directory: ${{ github.workspace }}

      - name: Generate Prisma client
        run: npx prisma generate --sql
        shell: bash
        working-directory: ${{ github.workspace }}/dms-api

      - name: Run tests
        run: npm run test
        shell: bash
        working-directory: ${{ github.workspace }}

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Copy project to VPS
        run: |
          rsync -avz --exclude='.git' --exclude='node_modules' --exclude='**/node_modules' ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}

      - name: Deploy with docker-compose
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd ${{ secrets.VPS_PATH }} && docker-compose -f docker-compose.prod.yml pull && docker-compose -f docker-compose.prod.yml up -d --remove-orphans"
