name: dms

services:
  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
  dms-api:
    build:
      context: ./
      dockerfile: dms-api/Dockerfile
    container_name: dms-api
    ports:
      - '3000:3000'
    env_file:
      - ./dms-api/.env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
      - TAX_RECEIPT_TEMPLATE=demo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    restart: unless-stopped

  dms-frontend:
    build:
      context: ./
      dockerfile: dms-frontend/Dockerfile
    container_name: dms-frontend
    ports:
      - '5173:5173'
    depends_on:
      - dms-api
    restart: unless-stopped

volumes:
  redis_data:
