version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
  dms-api:
    build:
      context: ./
      dockerfile: dms-api/Dockerfile
    container_name: dms-api
    ports:
      - '3000:3000'
    env_file:
      - ./dms-api/.env.prod
    environment:
      - NODE_ENV=production
    volumes:
      - ./dms-api/serviceAccount.json:/app/dms-api/serviceAccount.json
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dms-worker:
    build:
      context: ./
      dockerfile: dms-api/Dockerfile
    container_name: dms-worker
    command: ["/bin/sh", "./startup.sh", "worker"]
    env_file:
      - ./dms-api/.env.prod
    environment:
      - NODE_ENV=production
    volumes:
      - ./dms-api/serviceAccount.json:/app/dms-api/serviceAccount.json
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node"]
      interval: 30s
      timeout: 5s
      retries: 3

  dms-frontend:
    build:
      context: ./
      dockerfile: dms-frontend/Dockerfile
    container_name: dms-frontend
    ports:
      - '5173:5173'
    depends_on:
      - dms-api
    restart: unless-stopped

volumes:
  redis_data:
